# Run 12b: Re-run of Run 12 with bug fixes
# Run 12 had two bugs: (1) post-sweep LR dropped to ~1e-10 instead of winner LR,
# (2) sweep counter bypassed max limit due to consecutive counter resets.
# With fixes, training should now properly use the sweep-winning LR between sweeps.
# Architecture: decoder-only d12 e256 (proven by Run 7, best orig loss 0.0092).
# Also limits max_workers to prevent GPU memory exhaustion during sweeps.

# Sample budget: effectively unlimited - let divergence/time stop training
stage_samples_multiplier: 100000000000
total_samples: 10000000

# Time budget: 360 min
stage_time_budget_min: 360

# Divergence stopping
stop_on_divergence: true
divergence_gap: 0.002
divergence_ratio: 1.5
divergence_patience: 30
divergence_min_updates: 10
val_spike_threshold: 2.0
val_spike_window: 15
val_spike_frequency: 0.75

# Learning rate: standard for fresh training
custom_lr: 0.0003
disable_lr_scaling: true
custom_warmup: -1
lr_min_ratio: 0.001

# NO upfront sweep, but YES plateau sweeps
initial_sweep_enabled: false
plateau_sweep:
  enabled: true
  plateau_patience: 25
  plateau_improvement_threshold: 0.005
  cooldown_updates: 5
  max_sweeps_per_stage: 3
  min_sweep_improvement: 0.0

# Training
batch_size: 8
update_interval: 250
sampling_mode: "Loss-weighted"
loss_weight_temperature: 0.5
loss_weight_refresh_interval: 50

# Limit parallel sweep workers (single GPU safety)
max_workers: 3

# Single run for fast iteration
runs_per_stage: 1
serial_runs: true

# W&B and reproducibility
enable_wandb: true
wandb_project: "developmental-robot-movement"
seed: 42
