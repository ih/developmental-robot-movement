# Run 4: Decoder-only depth 12 (direct attention to separators)
# Hypothesis: encoder-decoder bottleneck washes out separator signal;
# decoder-only lets masked patches attend directly to separator tokens at every layer.
# Changes from runs 1-3:
#   - MODEL_TYPE "encoder_decoder" -> "decoder_only" in config.py
#   - DECODER_DEPTH 5 -> 12 in config.py
#   - Reverted FOCAL_LOSS_ALPHA back to 1.0 (pure MSE)
#   - Reverted FOCAL_BETA back to 5
# Carried:
#   - SEPARATOR_WIDTH = 32 in config.py
#   - WEIGHT_DECAY = 0.01 in config.py

# Sample budget: effectively unlimited - let divergence stop training
stage_samples_multiplier: 100000000000
total_samples: 10000000

# Time budget
stage_time_budget_min: 180

# Divergence stopping
stop_on_divergence: true
divergence_gap: 0.002
divergence_ratio: 1.5
divergence_patience: 30
divergence_min_updates: 10
val_spike_threshold: 2.0
val_spike_window: 15
val_spike_frequency: 0.75

# Learning rate
custom_lr: 0.0003
disable_lr_scaling: true
custom_warmup: -1
lr_min_ratio: 0.001

# NO LR sweeps
initial_sweep_enabled: false
plateau_sweep:
  enabled: false

# Training
batch_size: 8
update_interval: 250
sampling_mode: "Loss-weighted"
loss_weight_temperature: 0.5
loss_weight_refresh_interval: 50

# Single run for fast iteration
runs_per_stage: 1
serial_runs: true

# W&B and reproducibility
enable_wandb: true
wandb_project: "developmental-robot-movement"
seed: 42
