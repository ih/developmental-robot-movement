# Run 2: Wider separators (32px, set in config.py) + weight decay 0.01 (config.py)
# Changes from run 1:
#   - SEPARATOR_WIDTH 16 -> 32 in config.py (doubles action signal, 2 patch columns)
#   - WEIGHT_DECAY 0.0 -> 0.01 in config.py (regularization)
#   - divergence_patience 50 -> 30 (stop earlier when overfitting)

# Sample budget: effectively unlimited - let divergence stop training
stage_samples_multiplier: 100000000000
total_samples: 10000000

# Time budget
stage_time_budget_min: 180

# Divergence stopping - tighter patience to stop earlier
stop_on_divergence: true
divergence_gap: 0.002
divergence_ratio: 1.5
divergence_patience: 30
divergence_min_updates: 10
val_spike_threshold: 2.0
val_spike_window: 15
val_spike_frequency: 0.75

# Learning rate: same as run 1
custom_lr: 0.0003
disable_lr_scaling: true
custom_warmup: -1
lr_min_ratio: 0.001

# NO LR sweeps - manual tuning between runs
initial_sweep_enabled: false
plateau_sweep:
  enabled: false

# Training
batch_size: 8
update_interval: 250
sampling_mode: "Loss-weighted"
loss_weight_temperature: 0.5
loss_weight_refresh_interval: 50

# Single run for fast iteration
runs_per_stage: 1
serial_runs: true

# W&B and reproducibility
enable_wandb: true
wandb_project: "developmental-robot-movement"
seed: 42
