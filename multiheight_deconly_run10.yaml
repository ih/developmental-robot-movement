# Run 10: Deeper model from scratch for sharper predictions
# Hypothesis: Run 9's wider model (embed_dim=512) overfitted without improving
# sharpness. Try deeper instead: more representational layers with proven
# embed_dim=256. Depth 16 adds 33% more layers than run 7's depth 12.
# Changes from run 7 defaults:
#   - DECODER_DEPTH 12 -> 16 in config.py
#   - custom_lr 3e-4 (standard for fresh training)
#   - No checkpoint resume (training from scratch)
# Kept from run 7:
#   - MODEL_TYPE = "decoder_only" in config.py
#   - DECODER_EMBED_DIM = 256 in config.py
#   - SEPARATOR_WIDTH = 32 in config.py
#   - WEIGHT_DECAY = 0.01 in config.py
#   - PERCEPTUAL_LOSS_WEIGHT = 0.01 in config.py

# Sample budget: effectively unlimited - let divergence stop training
stage_samples_multiplier: 100000000000
total_samples: 10000000

# Time budget
stage_time_budget_min: 180

# Divergence stopping
stop_on_divergence: true
divergence_gap: 0.002
divergence_ratio: 1.5
divergence_patience: 30
divergence_min_updates: 10
val_spike_threshold: 2.0
val_spike_window: 15
val_spike_frequency: 0.75

# Learning rate: standard for fresh training
custom_lr: 0.0003
disable_lr_scaling: true
custom_warmup: -1
lr_min_ratio: 0.001

# NO LR sweeps
initial_sweep_enabled: false
plateau_sweep:
  enabled: false

# Training
batch_size: 8
update_interval: 250
sampling_mode: "Loss-weighted"
loss_weight_temperature: 0.5
loss_weight_refresh_interval: 50

# Single run for fast iteration
runs_per_stage: 1
serial_runs: true

# W&B and reproducibility
enable_wandb: true
wandb_project: "developmental-robot-movement"
seed: 42
